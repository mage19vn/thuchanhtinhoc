  <script>
    document.addEventListener('DOMContentLoaded', () => {
 
      if (typeof loadNavbar === 'function') {
        loadNavbar();
      }
 
      const urlParams = new URLSearchParams(window.location.search);
      const subjectName = urlParams.get('subject');
      
      const container = document.querySelector('#apps-container');
      const titleTag = document.querySelector('#list03-g .mbr-section-title strong');

      if (subjectName && typeof subjectsData !== 'undefined' && subjectsData[subjectName]) {
 
        titleTag.innerText = `Danh sách ứng dụng: ${subjectName}`;
        
        const apps = subjectsData[subjectName];
        
        if (Array.isArray(apps)) { 
          apps.forEach(appName => { 
            const appInfo = (typeof appsData !== 'undefined') ? appsData.find(a => a.ten_phan_mem === appName) : null;
            const desc = appInfo ? appInfo.dung_de : "Mô tả đang cập nhật";
             
            const htmlItem = `
            <div class="row app-card mx-auto" style="max-width: 900px;">
              <div class="col-12 col-md-4 col-lg-4">
                <h5 class="app-title mt-0 mb-2 display-7">
                  <a href="page1.html?app=${encodeURIComponent(appName)}">${appName}</a>
                </h5>
              </div>
              <div class="col-12 col-md-8 col-lg-8">
                <p class="mbr-text mbr-fonts-style mt-0 mb-0 display-7 text-muted">${desc}</p>
              </div>
            </div>`;
            container.insertAdjacentHTML('beforeend', htmlItem);
          });
        } else { 
          container.insertAdjacentHTML('beforeend', `
            <div class="row justify-content-center">
                <p class="mbr-text display-7 text-center text-muted" style="font-style: italic;">${apps}</p>
            </div>
          `);
        }
      } else {
         titleTag.innerText = "Vui lòng chọn một môn học từ Menu.";
      }
    });
  </script>
