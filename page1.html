  <script>
    document.addEventListener('DOMContentLoaded', () => { 
      if (typeof loadNavbar === 'function') {
        loadNavbar();
      }
 
      const urlParams = new URLSearchParams(window.location.search);
      const appName = urlParams.get('app');

      if (appName && typeof appsData !== 'undefined') { 
        const appInfo = appsData.find(a => a.ten_phan_mem === appName);
        
        if (appInfo) { 
          const titleElement = document.querySelector('.card-title strong');
          if (titleElement) titleElement.innerText = appInfo.ten_phan_mem;
 
          const imageElement = document.querySelector('.image-wrapper img');
          if (imageElement) {
              imageElement.src = appInfo.hinh_anh;
              imageElement.alt = appInfo.ten_phan_mem;
          }
 
          const textElements = document.querySelectorAll('.item-wrapper .mbr-text');
          
          if(textElements.length >= 3) {
            textElements[0].innerHTML = appInfo.uu_diem ? appInfo.uu_diem : "Đang cập nhật";
            textElements[1].innerHTML = appInfo.nhuoc_diem ? appInfo.nhuoc_diem : "Đang cập nhật";
            textElements[2].innerHTML = `<a href="${appInfo.link}" target="_blank" class="text-primary" style="word-break: break-all; font-weight: bold;">${appInfo.link}</a>`;
          }
        }
      } else {
        const titleElement = document.querySelector('.card-title strong');
        if (titleElement) titleElement.innerText = "Không tìm thấy thông tin phần mềm";
      }
    });
  </script>
